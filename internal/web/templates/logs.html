{{define "title"}}Logs - AdGuard-LogCentral{{end}}

{{define "content"}}
<div class="toolbar">
  <form id="filters" class="filters"
        hx-get="/partials/logs"
        hx-target="#log-body"
        hx-swap="innerHTML"
        hx-trigger="submit, change, keyup delay:300ms from:find input[name=search]">
    <input type="search" name="search" value="{{.Search}}" placeholder="Search domain, client IP or name (exact; use * to wildcard)" autocomplete="off">

    <select name="status" aria-label="Response status">
      <option value="" {{if eq .Status ""}}selected{{end}}>All responses</option>
      <option value="blocked" {{if eq .Status "blocked"}}selected{{end}}>Blocked</option>
      <option value="rewritten" {{if eq .Status "rewritten"}}selected{{end}}>Rewritten</option>
      <option value="processed" {{if eq .Status "processed"}}selected{{end}}>Allowed</option>
    </select>

    <span class="instances">
      {{range .Instances}}
      <label class="inst-chip inst-c{{instColor .Name}}">
        <input type="checkbox" name="instance" value="{{.Name}}" {{if .Checked}}checked{{end}}>
        <span class="chip-body">{{.Name}}</span>
      </label>
      {{end}}
    </span>
  </form>

  <div class="toolbar-right">
    <label class="block-target">
      <span class="block-target-label">Block via</span>
      <select id="block-target" name="instance" aria-label="Instance to apply block and unblock rules to">
        {{range .Instances}}<option value="{{.Name}}">{{.Name}}</option>{{end}}
      </select>
    </label>

    <button type="button" class="refresh-btn"
            hx-get="/partials/logs" hx-include="#filters"
            hx-target="#log-body" hx-swap="innerHTML"
            title="Refresh now" aria-label="Refresh now">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4z"/>
      </svg>
      <span>Refresh</span>
    </button>

    <label class="switch" title="Auto-refresh the log every 10 seconds">
      <input type="checkbox" id="auto" name="auto" value="on" {{if .AutoRefresh}}checked{{end}}>
      <span class="switch-track"><span class="switch-thumb"></span></span>
      <span class="switch-text">Auto-refresh</span>
    </label>
  </div>
</div>

<table class="logs">
  <thead>
    <tr>
      <th>Time</th>
      <th>Instance</th>
      <th>Client</th>
      <th>Domain</th>
      <th>Type</th>
      <th>Result</th>
      <th>Elapsed</th>
      <th class="control-col"></th>
    </tr>
  </thead>
  <tbody id="log-body"
         hx-get="/partials/logs"
         hx-include="#filters"
         hx-trigger="every 10s [document.getElementById('auto').checked]">
    {{template "logs_rows" .}}
  </tbody>
</table>

<!-- Confirmation modal for the mobile long-press block/unblock flow. Hidden
     until a long-press on a log row opens it. -->
<div id="block-modal" class="modal" hidden>
  <div class="modal-backdrop" data-modal-close></div>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="block-modal-title">
    <h2 id="block-modal-title" class="modal-title">Block domain</h2>
    <p class="modal-body">
      <span id="block-modal-action">Block</span>
      <span id="block-modal-domain" class="modal-domain"></span>
      on <strong id="block-modal-instance"></strong>?
    </p>
    <p id="block-modal-error" class="modal-error" hidden>Could not update the rule. Please try again.</p>
    <div class="modal-actions">
      <button type="button" class="modal-btn modal-cancel" data-modal-close>Cancel</button>
      <button type="button" class="modal-btn modal-confirm" id="block-modal-confirm">Block</button>
    </div>
  </div>
</div>

<script>
  // Persist the operator's chosen block target instance across visits.
  (function () {
    var sel = document.getElementById('block-target');
    if (!sel) { return; }
    var key = 'adguard-block-target';
    var saved = localStorage.getItem(key);
    if (saved) {
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === saved) { sel.value = saved; break; }
      }
    }
    sel.addEventListener('change', function () {
      localStorage.setItem(key, sel.value);
    });
  })();

  // Click a client or domain cell to filter the log by that exact value.
  (function () {
    var table = document.querySelector('table.logs');
    var search = document.querySelector('#filters input[name=search]');
    if (!table || !search) { return; }
    table.addEventListener('click', function (ev) {
      var btn = ev.target.closest('.cell-filter');
      if (!btn) { return; }
      // A long-press swallows the click that would otherwise filter (see below).
      if (table.dataset.longPressed === 'true') { return; }
      search.value = btn.getAttribute('data-value');
      // Fire the same event the filter form listens for, triggering a refetch.
      search.dispatchEvent(new Event('change', { bubbles: true }));
    });
  })();

  // Long-press a log row to block or unblock its domain via a confirmation
  // modal. This is the touch-only replacement for the per-row Block button,
  // which the mobile card layout hides.
  (function () {
    var table = document.querySelector('table.logs');
    var modal = document.getElementById('block-modal');
    var targetSel = document.getElementById('block-target');
    if (!table || !modal) { return; }

    var LONG_PRESS_MS = 500;
    var MOVE_TOLERANCE = 10;
    var confirmBtn = document.getElementById('block-modal-confirm');
    var errorEl = document.getElementById('block-modal-error');
    var timer = null;
    var startX = 0, startY = 0;
    var pending = null; // { row, domain, action, instance }

    function clearTimer() {
      if (timer) { window.clearTimeout(timer); timer = null; }
    }

    function openModal(row) {
      var blocked = row.getAttribute('data-blocked') === 'true';
      var action = blocked ? 'unblock' : 'block';
      var label = blocked ? 'Unblock' : 'Block';
      var instance = targetSel ? targetSel.value : '';
      pending = { row: row, domain: row.getAttribute('data-domain'), action: action, instance: instance };

      document.getElementById('block-modal-title').textContent = label + ' domain';
      document.getElementById('block-modal-action').textContent = label;
      document.getElementById('block-modal-domain').textContent = pending.domain;
      document.getElementById('block-modal-instance').textContent = instance;
      confirmBtn.textContent = label;
      confirmBtn.className = 'modal-btn modal-confirm ' + (blocked ? 'is-unblock' : 'is-block');
      confirmBtn.disabled = false;
      errorEl.hidden = true;

      modal.hidden = false;
      document.body.classList.add('modal-open');
      confirmBtn.focus();
    }

    function closeModal() {
      modal.hidden = true;
      document.body.classList.remove('modal-open');
      pending = null;
    }

    function submit() {
      if (!pending) { return; }
      var body = new URLSearchParams();
      body.set('domain', pending.domain);
      body.set('action', pending.action);
      body.set('instance', pending.instance);
      confirmBtn.disabled = true;
      errorEl.hidden = true;
      fetch('/partials/block', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
        credentials: 'same-origin'
      }).then(function (resp) {
        if (!resp.ok) { throw new Error('block request failed'); }
        // Reflect the new state so a later long-press offers the inverse action.
        pending.row.setAttribute('data-blocked', pending.action === 'block' ? 'true' : 'false');
        closeModal();
      }).catch(function () {
        confirmBtn.disabled = false;
        errorEl.hidden = false;
      });
    }

    // Touch handlers drive the press-and-hold gesture.
    table.addEventListener('touchstart', function (ev) {
      var row = ev.target.closest('tr[data-domain]');
      if (!row) { return; }
      var t = ev.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      table.dataset.longPressed = 'false';
      clearTimer();
      timer = window.setTimeout(function () {
        table.dataset.longPressed = 'true';
        openModal(row);
      }, LONG_PRESS_MS);
    }, { passive: true });

    table.addEventListener('touchmove', function (ev) {
      var t = ev.touches[0];
      if (Math.abs(t.clientX - startX) > MOVE_TOLERANCE ||
          Math.abs(t.clientY - startY) > MOVE_TOLERANCE) {
        clearTimer();
      }
    }, { passive: true });

    table.addEventListener('touchend', clearTimer);
    table.addEventListener('touchcancel', clearTimer);

    // Dismiss controls: Cancel button, backdrop tap, or the Escape key.
    modal.addEventListener('click', function (ev) {
      if (ev.target.closest('[data-modal-close]')) { closeModal(); }
    });
    confirmBtn.addEventListener('click', submit);
    document.addEventListener('keydown', function (ev) {
      if (ev.key === 'Escape' && !modal.hidden) { closeModal(); }
    });
  })();
</script>
{{end}}
