name: Release

# Manual release, modelled on the Monize release flow. Triggered from the
# Actions tab (or `gh workflow run Release --ref main`) when you actually want a
# release. It:
#
#   1. Runs the full CI suite (lint, tests, govulncheck, gosec) as a gate.
#   2. Resolves the new version from the latest `v*` git tag and the inputs.
#   3. Builds, signs (cosign, keyless), scans (Trivy) and pushes the multi-arch
#      image tagged with the version, `MAJOR.MINOR`, and `latest`, with SBOM and
#      provenance attestations.
#   4. Only after the image is built and clean, creates the `v<version>` git tag
#      and cuts the GitHub release, so a failed or vulnerable build never leaves
#      a dangling tag.
#
# The version lives in git tags (the Go idiom) rather than a package.json, and
# is stamped into the binary via -ldflags (see internal/buildinfo + Dockerfile).
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump (ignored when an explicit "version" is given)'
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: 'Explicit version, e.g. 1.2.0 (overrides "release_type"; blank = bump)'
        type: string
        default: ''
      release_notes:
        description: 'Release notes (Markdown). Blank = use docs/release-notes/<version>.md, else GitHub auto-notes'
        type: string
        default: ''

# A release must not be cancelled by a newer dispatch mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Run the full CI suite as the release gate. Reuses .github/workflows/ci.yml
  # so the release runs exactly the same checks as a push or PR -- no drift
  # between the PR gate and the release gate.
  gate:
    name: CI gate
    permissions:
      contents: read
      security-events: write # gosec/Trivy in the reused workflow upload SARIF
    uses: ./.github/workflows/ci.yml

  # Resolve the release version from the latest v* git tag and the inputs, and
  # stamp shared build metadata ONCE so every downstream job uses identical
  # values. No tag is created here.
  prepare:
    name: Prepare release
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_date: ${{ steps.meta.outputs.build_date }}
      git_sha: ${{ steps.meta.outputs.git_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need all tags to resolve the current version
          persist-credentials: false

      # An explicit `version` input wins; otherwise bump the highest existing
      # v* tag (or 0.0.0 when none exist yet). Inputs are read via env and never
      # interpolated into the script, to avoid template injection.
      - name: Resolve version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          EXPLICIT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(git tag --list 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')
          CURRENT=${CURRENT:-0.0.0}
          if [ -n "$EXPLICIT_VERSION" ]; then
            if ! printf '%s' "$EXPLICIT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version '$EXPLICIT_VERSION' (expected MAJOR.MINOR.PATCH, e.g. 1.2.0)"
              exit 1
            fi
            NEW_VERSION="$EXPLICIT_VERSION"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${RELEASE_TYPE:-patch}" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
              *)     NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac
          fi
          if git rev-parse -q --verify "refs/tags/v${NEW_VERSION}" >/dev/null; then
            echo "::error::Tag v${NEW_VERSION} already exists; refusing to overwrite a release"
            exit 1
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${CURRENT} -> ${NEW_VERSION} (type=${RELEASE_TYPE:-patch}, explicit=${EXPLICIT_VERSION:-none})"

      - name: Set build metadata
        id: meta
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "git_sha=$GIT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  # Build, sign, scan and push the multi-arch image. Only after this passes does
  # the release job below create the tag and the GitHub release.
  build-and-push:
    name: Build, sign & push image
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to GHCR
      id-token: write # cosign keyless signing + provenance/SBOM attestations
      security-events: write # upload Trivy SARIF
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.prepare.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            GIT_SHA=${{ needs.prepare.outputs.git_sha }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing via GitHub's OIDC token: no long-lived keys to manage.
      # Signing by digest is what counts; the tag refs are signed too so
      # `cosign verify ...:<version>` resolves cleanly.
      - name: Sign image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cosign sign --yes \
            "${IMAGE}@${DIGEST}" \
            "${IMAGE}:${VERSION}" \
            "${IMAGE}:latest"

      # Trivy is installed via its official script so we do not depend on a
      # third-party action tag being available.
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/trivy-bin"

      - name: Trivy image scan (SARIF)
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          "$RUNNER_TEMP/trivy-bin/trivy" image \
            --format sarif --output trivy.sarif \
            --severity CRITICAL,HIGH --ignore-unfixed \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-image

      # Gate the release on the image being free of fixable CRITICAL CVEs, the
      # same policy the Monize release uses. HIGH findings surface in the
      # Security tab but do not block.
      - name: Fail on critical CVEs
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          "$RUNNER_TEMP/trivy-bin/trivy" image \
            --format table \
            --severity CRITICAL --ignore-unfixed --exit-code 1 \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

  # The image is built, signed and clean. Now -- and only now -- create the git
  # tag and cut the GitHub release, so a failed build never leaves a dangling
  # tag. `gh release create` creates the v<version> tag at the release commit.
  release:
    name: Tag & GitHub release
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the git tag and the GitHub release
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Resolve the release-notes body. Precedence: the `release_notes` input,
      # then a committed docs/release-notes/<version>.md, then GitHub's
      # auto-generated notes. The input is read via env to avoid injection.
      - name: Resolve release notes
        id: notes
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          NOTES_FILE="docs/release-notes/${VERSION}.md"
          if [ -n "$RELEASE_NOTES_INPUT" ]; then
            printf '%s\n' "$RELEASE_NOTES_INPUT" > "$RUNNER_TEMP/release-notes.md"
            echo "path=$RUNNER_TEMP/release-notes.md" >> "$GITHUB_OUTPUT"
            echo "Release notes: workflow input"
          elif [ -f "$NOTES_FILE" ]; then
            # Strip a leading "# v<version>" heading (and the blank lines after
            # it) so the release body does not duplicate the release title.
            awk -v ver="$VERSION" '
              NR == 1 && $0 == "# v" ver { skip = 1; next }
              skip && $0 ~ /^[[:space:]]*$/ { next }
              { skip = 0; print }
            ' "$NOTES_FILE" > "$RUNNER_TEMP/release-notes.md"
            echo "path=$RUNNER_TEMP/release-notes.md" >> "$GITHUB_OUTPUT"
            echo "Release notes: $NOTES_FILE"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "Release notes: GitHub auto-generated (no input or notes file found)"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET_SHA: ${{ needs.prepare.outputs.git_sha }}
          NOTES_PATH: ${{ steps.notes.outputs.path }}
        run: |
          if [ -n "$NOTES_PATH" ]; then
            gh release create "v${VERSION}" \
              --target "$TARGET_SHA" \
              --title "v${VERSION}" \
              --notes-file "$NOTES_PATH"
          else
            gh release create "v${VERSION}" \
              --target "$TARGET_SHA" \
              --title "v${VERSION}" \
              --generate-notes
          fi
