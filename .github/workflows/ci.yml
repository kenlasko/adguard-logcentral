name: CI

# Two paths share this file, modelled on the Monize "CI Pipeline":
#
#   * Checks (push to main + PRs): lint, tests, govulncheck, gosec. No release.
#
#   * Release (manual run / workflow_dispatch on main): runs the same check
#     suite as a gate, then resolves the version, builds/signs/scans/pushes the
#     multi-arch image (versioned + MAJOR.MINOR + latest), and cuts the
#     v<version> GitHub release. The inputs below choose the version bump and let
#     you supply release notes (see docs/release-notes/README.md). Trigger from
#     the Actions tab (CI -> Run workflow) or `gh workflow run CI --ref main`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump (ignored when an explicit "version" is given)'
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: 'Explicit version, e.g. 1.2.0 (overrides "release_type"; blank = bump)'
        type: string
        default: ''
      release_notes:
        description: 'Release notes (Markdown). Blank = use docs/release-notes/<version>.md, else GitHub auto-notes'
        type: string
        default: ''

# Cancel superseded push/PR runs on the same ref to save minutes, but never
# cancel a manual release run: it lives in a separate concurrency group with
# cancellation disabled, so a push landing mid-release cannot kill the publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && 'release' || 'ci' }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

env:
  # Install the exact patch release the project pins (must match the `toolchain`
  # directive in go.mod). setup-go reads only the `go` directive from go.mod,
  # which is the minor floor, so we pin the patch here to pick up stdlib security
  # fixes that govulncheck enforces.
  GO_VERSION: "1.26.5"
  # Use the setup-go toolchain and never auto-download another. This also makes
  # tools installed via `go install` link against the project's Go version,
  # which matters on brand-new Go releases where prebuilt linter binaries lag.
  GOTOOLCHAIN: local
  # GHCR image coordinates for the release build below.
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || {
            echo "go.mod/go.sum are not tidy; run 'go mod tidy' and commit.";
            exit 1;
          }

      - name: go mod verify
        run: go mod verify

      # golangci-lint (which bundles staticcheck, errcheck, and more) is built
      # from source so it links against the project's Go toolchain.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0

      - name: golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: go build ./...

      - name: Test with race detector and coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  govulncheck:
    name: Vulnerability scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: Security audit (gosec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -fmt sarif -out gosec.sarif -stdout -verbose=text ./...

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif
          category: gosec

  # ---------------------------------------------------------------------------
  # Release (manual run only). The three jobs below run only on a
  # workflow_dispatch against main, and only after the check jobs above pass.
  # On a push or PR they are skipped, so day-to-day CI is unchanged.
  # ---------------------------------------------------------------------------

  # Resolve the release version from the latest v* git tag and the inputs, and
  # stamp shared build metadata ONCE so every downstream job uses identical
  # values. No tag is created here.
  prepare-release:
    name: Prepare release
    # Manual-only: this is the release gate. A push/PR skips it (and everything
    # that needs it), so merges to main never auto-publish.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: [lint, test, govulncheck, gosec]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_date: ${{ steps.meta.outputs.build_date }}
      git_sha: ${{ steps.meta.outputs.git_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need all tags to resolve the current version
          persist-credentials: false

      # An explicit `version` input wins; otherwise bump the highest existing
      # v* tag (or 0.0.0 when none exist yet). Inputs are read via env and never
      # interpolated into the script, to avoid template injection.
      - name: Resolve version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          EXPLICIT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(git tag --list 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')
          CURRENT=${CURRENT:-0.0.0}
          if [ -n "$EXPLICIT_VERSION" ]; then
            if ! printf '%s' "$EXPLICIT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version '$EXPLICIT_VERSION' (expected MAJOR.MINOR.PATCH, e.g. 1.2.0)"
              exit 1
            fi
            NEW_VERSION="$EXPLICIT_VERSION"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${RELEASE_TYPE:-patch}" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
              *)     NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac
          fi
          if git rev-parse -q --verify "refs/tags/v${NEW_VERSION}" >/dev/null; then
            echo "::error::Tag v${NEW_VERSION} already exists; refusing to overwrite a release"
            exit 1
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${CURRENT} -> ${NEW_VERSION} (type=${RELEASE_TYPE:-patch}, explicit=${EXPLICIT_VERSION:-none})"

      - name: Set build metadata
        id: meta
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "git_sha=$GIT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  # Build, sign, scan and push the multi-arch image. Only after this passes does
  # the release job below create the tag and the GitHub release.
  build-and-push:
    name: Build, sign & push image
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to GHCR
      id-token: write # cosign keyless signing + provenance/SBOM attestations
      security-events: write # upload Trivy SARIF
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.prepare-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.prepare-release.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare-release.outputs.version }}
            GIT_SHA=${{ needs.prepare-release.outputs.git_sha }}
            BUILD_DATE=${{ needs.prepare-release.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing via GitHub's OIDC token: no long-lived keys to manage.
      # Signing by digest is what counts; the tag refs are signed too so
      # `cosign verify ...:<version>` resolves cleanly.
      - name: Sign image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          cosign sign --yes \
            "${IMAGE}@${DIGEST}" \
            "${IMAGE}:${VERSION}" \
            "${IMAGE}:latest"

      # Trivy is installed via its official script so we do not depend on a
      # third-party action tag being available.
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/trivy-bin"

      - name: Trivy image scan (SARIF)
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          "$RUNNER_TEMP/trivy-bin/trivy" image \
            --format sarif --output trivy.sarif \
            --severity CRITICAL,HIGH --ignore-unfixed \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-image

      # Gate the release on the image being free of fixable CRITICAL CVEs, the
      # same policy the Monize release uses. HIGH findings surface in the
      # Security tab but do not block.
      - name: Fail on critical CVEs
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          "$RUNNER_TEMP/trivy-bin/trivy" image \
            --format table \
            --severity CRITICAL --ignore-unfixed --exit-code 1 \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

  # The image is built, signed and clean. Now -- and only now -- create the git
  # tag and cut the GitHub release, so a failed build never leaves a dangling
  # tag. `gh release create` creates the v<version> tag at the release commit.
  release:
    name: Tag & GitHub release
    needs: [prepare-release, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the git tag and the GitHub release
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Resolve the release-notes body. Precedence: the `release_notes` input,
      # then a committed docs/release-notes/<version>.md, then GitHub's
      # auto-generated notes. The input is read via env to avoid injection.
      - name: Resolve release notes
        id: notes
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          NOTES_FILE="docs/release-notes/${VERSION}.md"
          if [ -n "$RELEASE_NOTES_INPUT" ]; then
            printf '%s\n' "$RELEASE_NOTES_INPUT" > "$RUNNER_TEMP/release-notes.md"
            echo "path=$RUNNER_TEMP/release-notes.md" >> "$GITHUB_OUTPUT"
            echo "Release notes: workflow input"
          elif [ -f "$NOTES_FILE" ]; then
            # Strip a leading "# v<version>" heading (and the blank lines after
            # it) so the release body does not duplicate the release title.
            awk -v ver="$VERSION" '
              NR == 1 && $0 == "# v" ver { skip = 1; next }
              skip && $0 ~ /^[[:space:]]*$/ { next }
              { skip = 0; print }
            ' "$NOTES_FILE" > "$RUNNER_TEMP/release-notes.md"
            echo "path=$RUNNER_TEMP/release-notes.md" >> "$GITHUB_OUTPUT"
            echo "Release notes: $NOTES_FILE"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "Release notes: GitHub auto-generated (no input or notes file found)"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          TARGET_SHA: ${{ needs.prepare-release.outputs.git_sha }}
          NOTES_PATH: ${{ steps.notes.outputs.path }}
        run: |
          if [ -n "$NOTES_PATH" ]; then
            gh release create "v${VERSION}" \
              --target "$TARGET_SHA" \
              --title "v${VERSION}" \
              --notes-file "$NOTES_PATH"
          else
            gh release create "v${VERSION}" \
              --target "$TARGET_SHA" \
              --title "v${VERSION}" \
              --generate-notes
          fi
