name: Docker

# Continuous image build for main and PRs: pushes a moving `latest` (plus a
# branch and short-SHA tag) so the tip of main is always pullable, and builds
# (without pushing) on PRs as a smoke test. Formal, versioned, cosign-signed
# releases -- the `v<version>` tags -- are cut by the manual release workflow
# (.github/workflows/release.yml), which owns the version bump and the tag, so
# this workflow deliberately does NOT trigger on tags (that would double-build
# the release and race the tag's digest against the signed one).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # sign provenance/SBOM attestations
      security-events: write # upload Trivy SARIF
    steps:
      - uses: actions/checkout@v7

      # QEMU is not strictly required (the Go build cross-compiles on the native
      # builder and the runtime stage only copies the binary), but it keeps the
      # setup robust if the Dockerfile ever gains a target-arch RUN step.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only log in and push for events that own the repository (not PRs from
      # forks, which cannot access the registry token).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Versioned semver tags are produced by the release workflow, not here.
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # Scan the pushed image for OS and Go-binary vulnerabilities. Runs only
      # when an image was actually pushed (a stable ref exists to scan). Trivy
      # is installed via its official script so we do not depend on third-party
      # action tag availability.
      - name: Install Trivy
        if: github.event_name != 'pull_request'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/trivy-bin"

      - name: Trivy image scan
        if: github.event_name != 'pull_request'
        env:
          # Trivy authenticates to GHCR with these to pull the image manifest.
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "$RUNNER_TEMP/trivy-bin/trivy" image \
            --format sarif --output trivy.sarif \
            --severity CRITICAL,HIGH --ignore-unfixed \
            "${REGISTRY}/${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy-image
